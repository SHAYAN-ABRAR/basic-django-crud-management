{% extends 'base.html' %}
{% block title %}Edit Salary{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm border-warning">
        <div class="card-header bg-warning text-dark">
            <h4 class="mb-0">Edit Payment Record</h4>
        </div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>Employee</label>
                    <select name="employee_id" class="form-control" required>
                        {% for emp in employees %}
                        <option value="{{ emp.id }}" {% if emp.id == salary.employee.id %}selected{% endif %}>
                            {{ emp.emp_name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>Base Salary</label>
                        <input type="number" step="0.01" name="amount" class="form-control" value="{{ salary.amount }}" required>
                    </div>
                    <div class="form-group col-md-6">
                        <label>Bonus</label>
                        <input type="number" step="0.01" name="bonus" class="form-control" value="{{ salary.bonus }}">
                    </div>
                </div>
                <div class="form-group">
                    <label>Payment Date</label>
                    <input type="date" name="pay_date" class="form-control" value="{{ salary.pay_date|date:'Y-m-d' }}" required>
                </div>
                <button type="submit" class="btn btn-warning">Update Record</button>
                <a href="{% url 'payroll_home' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
