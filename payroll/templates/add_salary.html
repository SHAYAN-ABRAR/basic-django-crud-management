{% extends 'base.html' %}
{% block title %}Add Salary{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Process New Payment</h4>
        </div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>Select Employee</label>
                    <select name="employee_id" class="form-control" required>
                        <option value="">-- Choose Employee --</option>
                        {% for emp in employees %}
                        <option value="{{ emp.id }}">{{ emp.emp_name }} ({{ emp.emp_id }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>Base Salary</label>
                        <input type="number" step="0.01" name="amount" class="form-control" required>
                    </div>
                    <div class="form-group col-md-6">
                        <label>Bonus</label>
                        <input type="number" step="0.01" name="bonus" class="form-control" value="0.00">
                    </div>
                </div>
                <div class="form-group">
                    <label>Payment Date</label>
                    <input type="date" name="pay_date" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success">Confirm Payment</button>
                <a href="{% url 'payroll_home' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
